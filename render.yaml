services:
  - type: web
    name: smart-chennai-traffic-backend
    runtime: python
    region: singapore
    plan: free
    rootDir: backend
    pythonVersion: "3.11.0"
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn main:app --workers 1 --worker-class uvicorn.workers.UvicornWorker --bind 0.0.0.0:$PORT --timeout 120
    healthCheckPath: /health
    envVars:
      - key: ENV
        value: production
      - key: LOG_LEVEL
        value: info
      - key: ALLOWED_ORIGINS
        sync: false
        # ⬆️ Set this manually in Render dashboard to your real Vercel URL
        # Example: https://smart-chennai-traffic.vercel.app
